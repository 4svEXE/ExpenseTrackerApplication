<div class="app-container" [class.accessibility-visual]="financeData.userSettings().visualImpairmentMode"
  [class.accessibility-colorblind]="financeData.userSettings().colorBlindMode">
  <app-header />

  <router-outlet />

  <app-nav />
  <app-toast />
  <app-spending-plan-popup *ngIf="financeData.showPlanPopup()" (close)="financeData.showPlanPopup.set(false)" />
  <app-confirm-dialog />
  <app-support-modal />
  <app-gamification-modal />
  <app-frog-float-button />
</div>
