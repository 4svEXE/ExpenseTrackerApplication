<div class="flex justify-between items-end mb-4 px-2">
  <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Категорії</h3>
  <button (click)="toggleEditMode()" class="text-xs font-bold transition-colors"
    [ngClass]="isEditMode() ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'">
    {{ isEditMode() ? 'Готово' : 'Редагувати' }}
  </button>
</div>

<div class="grid grid-cols-4 md:grid-cols-5 gap-3 w-full">
  @for (category of categories; track $index) {
  <div class="relative flex flex-col items-center justify-start cursor-pointer group"
    (click)="!isEditMode() && onSelectCategory(category)">

    <!-- Planned Amount Badge -->
    <div *ngIf="category.plannedAmount && !isEditMode()"
      class="absolute -top-1 -right-1 z-10 bg-indigo-600 text-[8px] md:text-[10px] text-white px-2 py-0.5 rounded-full font-bold shadow-md border-2 border-white">
      {{ category.plannedAmount | currency:financeData.userSettings().currency:'symbol-narrow':'1.0-0' }}
    </div>

    <!-- Visibility Toggle (Only in Edit Mode) -->
    <button *ngIf="isEditMode()" (click)="toggleVisibility(category, $event)"
      class="absolute top-0 left-0 z-10 w-6 h-6 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center shadow-sm hover:bg-slate-200 transition-all active:scale-90 border border-slate-200">
      <i class="fa-solid" [ngClass]="category.isHidden ? 'fa-eye-slash text-rose-400' : 'fa-eye text-emerald-400'"></i>
    </button>

    <!-- Delete Badge (Only in Edit Mode) -->
    <button *ngIf="isEditMode()" (click)="deleteCategory(category, $event)"
      class="absolute -top-1 -right-1 z-10 w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-md hover:bg-rose-600 hover:scale-110 transition-all active:scale-90 border-2 border-white">
      <i class="fa-solid fa-minus text-[10px]"></i>
    </button>

    <div class="w-14 h-14 md:w-16 md:h-16 flex items-center justify-center rounded-2xl mb-2 transition-all duration-200"
      [ngClass]="[
           !isEditMode() && isSelectedCategory(category) ? 'bg-slate-800 text-white shadow-lg shadow-slate-300 border-2 border-transparent scale-105' : 'bg-white border-2 border-slate-100 text-slate-500',
           !isEditMode() ? 'hover:border-slate-300 hover:bg-slate-50 group-active:scale-95' : '',
           isEditMode() ? 'opacity-80' : '',
           category.isHidden ? 'grayscale opacity-30 scale-90' : ''
         ]">
      <i [class]="category.icon" class="text-xl md:text-2xl"
        [class.text-rose-500]="isEditMode() && !category.isHidden"></i>
    </div>
    <span class="text-[10px] md:text-xs font-bold text-center w-full truncate px-1 transition-colors" [ngClass]="[
        !isEditMode() && isSelectedCategory(category) ? 'text-slate-800' : 'text-slate-500',
        category.isHidden ? 'opacity-40' : ''
      ]">
      {{ category.name }}
    </span>
  </div>
  }

  <!-- Debts as One-time Categories -->
  <ng-container *ngFor="let debt of filteredDebts">
    <div class="relative flex flex-col items-center justify-start cursor-pointer group" (click)="onSelectDebt(debt)">

      <div
        class="w-14 h-14 md:w-16 md:h-16 flex items-center justify-center rounded-2xl mb-2 transition-all duration-200"
        [ngClass]="[
             isSelectedDebt(debt) ? 'bg-slate-800 text-white shadow-lg border-2 border-transparent scale-105' : 'bg-rose-50 border-2 border-rose-100 text-rose-500 hover:bg-rose-100 hover:border-rose-200'
           ]">
        <i class="fa-solid fa-hand-holding-dollar text-xl md:text-2xl"></i>
      </div>
      <span class="text-[10px] md:text-xs font-bold text-center w-full truncate px-1 transition-colors"
        [ngStyle]="{'color': isSelectedDebt(debt) ? '#1e293b' : '#f43f5e'}">
        {{ debt.name }}
      </span>
      <div class="text-[8px] font-black uppercase tracking-tighter text-rose-400 mt-[-2px]">Борг</div>
    </div>
  </ng-container>

  <!-- Add New Button -->
  <div class="flex flex-col items-center justify-start group" [class.cursor-pointer]="!isEditMode()"
    [class.opacity-50]="isEditMode()" (click)="!isEditMode() && toggleAddNew()">
    <div
      class="w-14 h-14 md:w-16 md:h-16 flex items-center justify-center rounded-2xl mb-2 transition-all duration-200 bg-transparent border-2 border-dashed border-slate-300 text-slate-400"
      [ngClass]="!isEditMode() ? 'hover:border-slate-500 hover:text-slate-600 group-active:scale-95' : ''">
      <i class="fa-solid fa-plus text-xl"></i>
    </div>
    <span class="text-[10px] md:text-xs font-bold text-center w-full truncate px-1 text-slate-500 transition-colors"
      [ngClass]="!isEditMode() ? 'group-hover:text-slate-700' : ''">
      Додати
    </span>
  </div>
</div>

<!-- Modal / Overlay for Adding New Category -->
<div *ngIf="isAddingNew()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl animate-in zoom-in duration-200">
    <!-- Header -->
    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
      <h3 class="text-xl font-bold text-slate-900">Нова категорія</h3>
      <button (click)="toggleAddNew()"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-6">
      <!-- Name Input -->
      <div class="space-y-2">
        <label class="text-sm font-bold text-slate-500 uppercase tracking-wider">Назва</label>
        <input [(ngModel)]="newCategoryName" type="text" placeholder="Наприклад: Кава, Таксі..."
          class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-black focus:ring-1 focus:ring-black outline-none transition-all font-medium">
      </div>

      <!-- Icon Selector -->
      <div class="space-y-2">
        <label class="text-sm font-bold text-slate-500 uppercase tracking-wider">Оберіть іконку</label>
        <div class="grid grid-cols-6 gap-2 max-h-48 overflow-y-auto p-2 bg-slate-50 rounded-xl border border-slate-100">
          <button *ngFor="let icon of availableIcons" (click)="selectIcon(icon)"
            class="w-full h-10 flex items-center justify-center rounded-lg transition-all"
            [ngClass]="selectedIcon === icon ? 'bg-black text-white shadow-lg' : 'hover:bg-slate-200 text-slate-500'">
            <i [class]="icon"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="p-6 bg-slate-50 flex gap-3">
      <button (click)="toggleAddNew()"
        class="flex-1 py-4 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all">
        Скасувати
      </button>
      <button (click)="saveNewCategory()" [disabled]="!newCategoryName.trim()"
        class="flex-1 py-4 rounded-xl font-bold bg-black text-white shadow-xl shadow-black/20 hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:hover:scale-100">
        Зберегти
      </button>
    </div>
  </div>
</div>
