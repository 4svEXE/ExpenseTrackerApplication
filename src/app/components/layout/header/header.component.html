<header class="flex justify-evenly gap-2">
  <div class="logo-container flex items-center relative gap-2">
    <img src="icons/logo.svg" alt="ETA Logo" id="app-logo"
      class="h-7 w-auto md:h-8 mix-blend-multiply transition-transform duration-300" />


    <!-- Coins Counter -->
    <div *ngIf="financeData.userSettings().coins" (click)="gamificationService.toggleInfoModal()"
      class="coins-counter flex items-center gap-1 bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full border border-amber-200 shadow-sm animate-in fade-in zoom-in duration-300 cursor-pointer active:scale-95 transition-all">
      <img src="icons/logo.svg" class="w-3 h-3 md:w-4 md:h-4" alt="coin" />
      <span class="text-[10px] md:text-xs font-bold">{{ financeData.userSettings().coins }}</span>
    </div>
  </div>

  <div class="amount-box gap-1 md:gap-2 items-center flex">
    <div class="expense">- {{ totalExpense$ | async | currency:userCurrency:'symbol-narrow':'1.0-0' }}</div>
    <div class="income">+ {{ totalIncome$ | async | currency:userCurrency:'symbol-narrow':'1.0-0' }}</div>
    <div class="amount flex items-center gap-2">
      <i class="fa-solid fa-wallet text-neutral-400"></i>
      <span>{{ totalBalance | currency:userCurrency:'symbol-narrow':'1.0-0' }}</span>
    </div>
  </div>
</header>
