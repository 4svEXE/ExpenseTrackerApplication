@if (isValidTransactionCategory()) {
<!-- Backdrop -->
<div
  class="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 flex items-center justify-center p-4"
  (click)="closeTransaction()">

  <!-- Modal Content -->
  <div class="relative w-full md:w-[400px] transition-all duration-300" (click)="$event.stopPropagation()">

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()"
      class="bg-white rounded-3xl p-5 md:p-6 shadow-2xl flex flex-col gap-4">

      <!-- Header -->
      <div class="flex justify-between items-center">
        <h3 class="text-xl font-extrabold"
          [ngClass]="transaction.transactionType === 'income' ? 'text-emerald-500' : 'text-rose-500'">
          {{ transaction.transactionType === 'income' ? 'Новий дохід' : 'Нова витрата' }}
        </h3>
        <button type="button"
          class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors"
          (click)="closeTransaction()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Category -->
      <div class="flex items-center gap-3 p-3 rounded-2xl bg-slate-50 border border-slate-100">
        <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm"
          [ngClass]="transaction.transactionType === 'income' ? 'text-emerald-500' : 'text-rose-500'">
          <i class="fa-solid fa-tag"></i>
        </div>
        <div>
          <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Категорія</p>
          <p class="text-sm font-bold text-slate-700">{{ transaction.category }}</p>
        </div>
      </div>

      <!-- Account -->
      <div>
        <label for="accountId"
          class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Рахунок</label>
        <div class="relative">
          <select id="accountId" formControlName="accountId"
            class="appearance-none w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-black focus:ring-2 focus:ring-slate-100 outline-none font-semibold text-sm text-slate-700 transition-all cursor-pointer">
            <option *ngFor="let acc of accounts()" [value]="acc.id">
              {{ acc.name }} ({{ acc.balance | currency:acc.currency:'symbol-narrow':'1.0-0' }})
            </option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
            <i class="fa-solid fa-chevron-down text-xs"></i>
          </div>
        </div>
      </div>

      <!-- Amount & Currency -->
      <div class="grid grid-cols-4 gap-2">
        <div class="col-span-3">
          <label for="amount"
            class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Сума</label>
          <input id="amount" type="number" formControlName="amount" autocomplete="off"
            class="w-full px-4 py-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:border-black focus:ring-2 focus:ring-slate-100 outline-none font-bold text-2xl text-slate-800 transition-all"
            placeholder="0.00" />
        </div>
        <div class="col-span-1">
          <label for="currency"
            class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Валюта</label>
          <select id="currency" formControlName="currency"
            class="w-full px-2 py-3.5 rounded-xl bg-slate-100 border border-slate-200 focus:border-black outline-none font-bold text-sm text-slate-700 transition-all cursor-pointer appearance-none text-center">
            <option value="UAH">₴</option>
            <option value="USD">$</option>
            <option value="EUR">€</option>
            <option value="CZK">Kč</option>
          </select>
        </div>
        <div class="col-span-4">
          <app-error-message [control]="transactionForm.get('amount')" [customMessages]="amountErrors"></app-error-message>
        </div>
      </div>

      <!-- Details Collapsible -->
      <div class="border border-slate-100 rounded-2xl overflow-hidden transition-all duration-300"
           [ngClass]="isDetailsOpen() ? 'bg-slate-50' : 'bg-white'">
        <button type="button" (click)="toggleDetails()"
          class="w-full flex items-center justify-between p-3.5 hover:bg-slate-50 transition-colors">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl flex items-center justify-center bg-indigo-50 text-indigo-500">
              <i class="fa-solid fa-layer-group text-xs"></i>
            </div>
            <span class="text-sm font-bold text-slate-700">Детальніше</span>
          </div>
          <div class="flex items-center gap-2">
            <!-- Active indicators -->
            <div *ngIf="isSubscription() || isDebt()" class="flex gap-1">
              <span *ngIf="isSubscription()" class="w-2 h-2 rounded-full bg-purple-500"></span>
              <span *ngIf="isDebt()" class="w-2 h-2 rounded-full bg-rose-500"></span>
            </div>
            <i class="fa-solid fa-chevron-down text-xs text-slate-400 transition-transform duration-300"
               [style.transform]="isDetailsOpen() ? 'rotate(180deg)' : ''"></i>
          </div>
        </button>

        <div *ngIf="isDetailsOpen()" class="p-4 pt-1 space-y-4 animate-in slide-in-from-top-2 duration-300">
          
          <!-- Subscription Toggle -->
          @if (transaction.transactionType === 'expense') {
          <div>
            <button type="button" (click)="toggleSubscription()"
              class="w-full flex items-center justify-between p-3 rounded-2xl border-2 transition-all duration-200"
              [ngClass]="isSubscription() ? 'border-purple-500 bg-purple-50' : 'border-slate-100 bg-white hover:border-slate-200'">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center transition-colors"
                  [ngClass]="isSubscription() ? 'bg-purple-500 text-white' : 'bg-slate-100 text-slate-500'">
                  <i class="fa-solid fa-rotate text-xs"></i>
                </div>
                <div class="text-left">
                  <div class="text-sm font-bold text-slate-700">Це підписка</div>
                  <div class="text-[10px] text-slate-400">Додати в список підписок</div>
                </div>
              </div>
              <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all"
                [ngClass]="isSubscription() ? 'border-purple-500 bg-purple-500' : 'border-slate-300'">
                @if (isSubscription()) {
                  <i class="fa-solid fa-check text-white text-[8px]"></i>
                }
              </div>
            </button>

            <!-- Subscription Details (nested) -->
            @if (isSubscription()) {
            <div class="mt-2 p-3 bg-white rounded-xl border border-purple-100 flex flex-col gap-3">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-[9px] font-bold text-purple-400 uppercase tracking-wider mb-1 block">Період</label>
                  <select [ngModel]="subPeriod()" (ngModelChange)="subPeriod.set($event)" [ngModelOptions]="{standalone: true}"
                    class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-purple-100 text-xs font-bold text-slate-700 outline-none focus:border-purple-300">
                    <option value="monthly">Щомісяця</option>
                    <option value="3months">Раз в 3 міс.</option>
                    <option value="yearly">Щорічно</option>
                    <option value="custom">Кастом (дні)</option>
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-bold text-purple-400 uppercase tracking-wider mb-1 block">Наступна дата</label>
                  <input type="date" [ngModel]="subNextDate()" (ngModelChange)="subNextDate.set($event)" [ngModelOptions]="{standalone: true}"
                    class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-purple-100 text-xs font-bold text-slate-700 outline-none focus:border-purple-300">
                </div>
                @if (subPeriod() === 'custom') {
                <div class="col-span-2">
                  <label class="text-[9px] font-bold text-purple-400 uppercase tracking-wider mb-1 block">Кількість днів</label>
                  <input type="number" [ngModel]="subCustomDays()" (ngModelChange)="subCustomDays.set($event)" [ngModelOptions]="{standalone: true}"
                    class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-purple-100 text-xs font-bold text-slate-700 outline-none focus:border-purple-300"
                    placeholder="30" min="1">
                </div>
                }
              </div>
            </div>
            }
          </div>
          }

          <!-- Debt Toggle -->
          <div>
            <button type="button" (click)="toggleDebt()"
              class="w-full flex items-center justify-between p-3 rounded-2xl border-2 transition-all duration-200"
              [ngClass]="isDebt() ? 'border-rose-500 bg-rose-50' : 'border-slate-100 bg-white hover:border-slate-200'">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center transition-colors"
                  [ngClass]="isDebt() ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-500'">
                  <i class="fa-solid fa-hand-holding-dollar text-xs"></i>
                </div>
                <div class="text-left">
                  <div class="text-sm font-bold text-slate-700">Це {{ transaction.transactionType === 'income' ? 'повернення боргу' : 'новий борг' }}</div>
                  <div class="text-[10px] text-slate-400">Додати в список боргів</div>
                </div>
              </div>
              <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all"
                [ngClass]="isDebt() ? 'border-rose-500 bg-rose-500' : 'border-slate-300'">
                @if (isDebt()) {
                  <i class="fa-solid fa-check text-white text-[8px]"></i>
                }
              </div>
            </button>
          </div>

        </div>
      </div>

      <!-- Description -->
      <div>
        <label for="description"
          class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Коментар
          (необов&#39;язково)</label>
        <input id="description" type="text" formControlName="description" autocomplete="off"
          class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:border-black focus:ring-2 focus:ring-slate-100 outline-none font-medium text-sm text-slate-700 transition-all"
          placeholder="Можна не вказувати..." />
        <app-error-message [control]="transactionForm.get('description')" [customMessages]="{
            maxlength: 'Максимум 50 символів.'
          }"></app-error-message>
      </div>

      <!-- Actions -->
      <div class="grid grid-cols-3 gap-2 mt-2">
        <button type="button" (click)="clearAmount()"
          class="py-3 rounded-xl bg-slate-100 border border-slate-200/60 text-slate-500 hover:bg-rose-50 hover:text-rose-500 hover:border-rose-100 transition-colors font-bold flex items-center justify-center text-lg">
          C
        </button>
        <button type="button" (click)="deleteLast()"
          class="py-3 rounded-xl bg-slate-100 border border-slate-200/60 text-slate-500 hover:bg-slate-200 transition-colors flex items-center justify-center">
          <i class="fa-solid fa-delete-left text-xl"></i>
        </button>
        <button type="submit" [disabled]="transactionForm.invalid" (click)="onSubmit($event)"
          class="py-3 rounded-xl text-white shadow-lg transition-all flex items-center justify-center disabled:opacity-50 disabled:shadow-none font-black uppercase tracking-widest text-[10px] px-6"
          [ngClass]="transaction.transactionType === 'income' ? 'bg-emerald-500 shadow-emerald-200 hover:bg-emerald-600 disabled:bg-slate-300' : 'bg-black shadow-black/10 hover:bg-neutral-800 disabled:bg-slate-300'">
          Зберегти
        </button>
      </div>
    </form>
  </div>
</div>
}
