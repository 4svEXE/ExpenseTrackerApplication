<div class="flex items-center">
  @if (selectedCategory === '') {
  <div class="relative flex items-center">
    <select id="categorySelect"
      class="appearance-none pl-3 md:pl-4 pr-8 md:pr-10 py-1.5 md:py-2.5 rounded-lg md:rounded-xl bg-slate-50 border border-slate-200 text-xs md:text-sm font-semibold text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 hover:bg-slate-100 transition-all cursor-pointer"
      (change)="onCategoryChange($event)">
      <option selected value="" class="text-slate-500">Всі категорії</option>
      @for (category of categories; track $index) {
      <option [value]="category.name">
        {{ category.name }}
      </option>
      }
    </select>
    <div class="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
      <i class="fa-solid fa-chevron-down text-[10px] md:text-xs"></i>
    </div>
  </div>
  } @else {
  <button
    class="flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-1.5 md:py-2.5 rounded-lg md:rounded-xl bg-indigo-50 border border-indigo-100 text-indigo-700 text-xs md:text-sm font-bold shadow-sm hover:bg-indigo-100 hover:border-indigo-200 transition-all active:scale-[0.98]"
    (click)="resetSelectedCategory()">
    <span>{{ selectedCategory }}</span>
    <i class="fa-solid fa-xmark text-[10px] md:text-xs opacity-70 mt-[1px]"></i>
  </button>
  }
</div>
