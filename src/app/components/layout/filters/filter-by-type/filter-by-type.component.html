<div class="flex items-center">
  @if (transactionType === '') {
  <div class="relative flex items-center">
    <select id="typeSelect"
      class="appearance-none pl-3 md:pl-4 pr-8 md:pr-10 py-1.5 md:py-2.5 rounded-lg md:rounded-xl bg-slate-50 border border-slate-200 text-xs md:text-sm font-semibold text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 hover:bg-slate-100 transition-all cursor-pointer"
      (change)="onTypeChange($event)">
      @for (type of transactionTypes; track $index) {
      <option [selected]="type.value === transactionType" [value]="type.value" class="text-slate-700">
        {{ type.label }}
      </option>
      }
    </select>
    <div class="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
      <i class="fa-solid fa-chevron-down text-[10px] md:text-xs"></i>
    </div>
  </div>
  } @else {
  <button
    class="flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-1.5 md:py-2.5 rounded-lg md:rounded-xl border text-xs md:text-sm font-bold shadow-sm transition-all active:scale-[0.98]"
    [ngClass]="transactionType === 'income' ? 'bg-emerald-50 border-emerald-100 text-emerald-700 hover:bg-emerald-100 hover:border-emerald-200' : 'bg-rose-50 border-rose-100 text-rose-700 hover:bg-rose-100 hover:border-rose-200'"
    (click)="resetSelectedType()">
    <span>{{ getLabel() }}</span>
    <i class="fa-solid fa-xmark text-[10px] md:text-xs opacity-70 mt-[1px]"></i>
  </button>
  }
</div>
